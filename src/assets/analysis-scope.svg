<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lens Base -->
  <circle cx="18" cy="18" r="15" stroke="#1E293B" stroke-width="2" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Crosshair (Dashed/Technical) -->
  <line x1="18" y1="8" x2="18" y2="28" stroke="#1E293B" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="8" y1="18" x2="28" y2="18" stroke="#1E293B" stroke-width="0.8" stroke-dasharray="2 2"/>
  
  <!-- Center Target Point -->
  <circle cx="18" cy="18" r="1.5" fill="#1E293B"/>

  <!-- Handle (Sleek/Long) -->
  <line x1="29" y1="29" x2="42" y2="42" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="40" y2="40" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
